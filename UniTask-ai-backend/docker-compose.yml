version: '3.8'

services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0827
      POSTGRES_DB: unitask
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "6543:5432"

  backend:
    build: .
    depends_on:
      - db
    ports:
      - "8008:8008"
    environment:
      UNITASK_MOCK: false
      UNITASK_DOCKER: true
      DATABASE_URL: postgresql://postgres:0827@db:5432/unitask
    command: >
      sh -c "sleep 3 && python create_tables.py && python main.py"

volumes:
  pgdata: